# Switchly stagenet — values for the internal staging network.
#
# The network runs against PUBLIC TESTNETS with OUR OWN in-cluster chain nodes (no third-party RPC
# providers): bitcoin-daemon on testnet3, ethereum-daemon (geth+prysm) on sepolia, and
# stellar-daemon (quickstart) on the stellar testnet. All other chain daemons are disabled.
#
# The chain daemons deploy ONCE, with the genesis node; validator installs disable them and point
# bifrost at the genesis namespace's daemon services (the deploy workflow handles this). Resources
# are right-sized for 4vCPU/8GB workers.
#
# Image: the stagenet release channel on GHCR. `global.hash` (image digest) is REQUIRED by the chart
# for validators and is resolved + set by the deploy workflow at deploy time.
#
# Per-node overrides the deploy workflow sets:
#   switchlynode.type                               genesis | validator
#   switchlynode.env.SWITCHLY_SEED_NODES_ENDPOINT   "" on genesis, genesis API svc on validators
#   switchlynode.env.FAUCET / SWITCHLY_STAGENET_ADMIN_ADDRESSES   (genesis, from repo variables)
#   bifrost.peer                                    gateway svc of the genesis namespace (validators)
global:
  net: stagenet
  tag: stagenet
  hash: "" # image digest — set at deploy time, never defaulted

switchlynode:
  net: stagenet
  # stagenet-scale resources (defaults are mainnet-grade and request whole workers)
  resources:
    requests:
      cpu: 1
      memory: 1536Mi
    limits:
      memory: 5Gi
  chainID:
    stagenet: switchly-stagenet-1
  env:
    SWITCHLY_SEED_NODES_ENDPOINT: ""
    # reuse the sepolia + stellar-testnet router deployments from tools/stagenet
    ETH_CONTRACT: "0xa8D1Ff3bfA490cf7890D0D2C0A2f5815744A279F"
    XLM_CONTRACT: "CAWZ7WYQBG2ENE7S7PAKPYVWKTOV3FMXMIKSOBBZE3JBJXTQWDGZDRGH"

bifrost:
  resources:
    requests:
      cpu: 500m
      memory: 1536Mi
    limits:
      memory: 6Gi
  chainID:
    stagenet: switchly-stagenet-1
  env:
    SWITCHLY_SEED_NODES_ENDPOINT: ""
    BIFROST_CHAINS_BTC_DISABLED: "false"
    BIFROST_CHAINS_ETH_DISABLED: "false"
    BIFROST_CHAINS_XLM_DISABLED: "false"
    # stellar via the in-cluster quickstart daemon (horizon + soroban on :8000); chain_network
    # must be explicit for the testnet network passphrase
    BIFROST_CHAINS_XLM_RPC_HOST: "http://stellar-daemon:8000"
    BIFROST_CHAINS_XLM_CHAIN_NETWORK: "testnet"
    BIFROST_CHAINS_AVAX_DISABLED: "true"
    BIFROST_CHAINS_GAIA_DISABLED: "true"
    BIFROST_CHAINS_BSC_DISABLED: "true"
    BIFROST_CHAINS_BASE_DISABLED: "true"
    BIFROST_CHAINS_DOGE_DISABLED: "true"
    BIFROST_CHAINS_BCH_DISABLED: "true"
    BIFROST_CHAINS_LTC_DISABLED: "true"
  bitcoinDaemon:
    enabled: true
    stagenet: bitcoin-daemon:8332
  litecoinDaemon:
    enabled: false
  bitcoinCashDaemon:
    enabled: false
  dogecoinDaemon:
    enabled: false
  ethereumDaemon:
    enabled: true
    stagenet: http://ethereum-daemon:8545
  gaiaDaemon:
    enabled: false
  avaxDaemon:
    enabled: false

midgard:
  enabled: false

# bitcoind on the PUBLIC TESTNET (testnet3): -testnet plus -rpcport pinned so the service port
# matches the mainnet default the charts expect. txindex (required by bifrost) rules out pruning;
# testnet3 with txindex needs roomy storage.
bitcoin-daemon:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 5Gi
  extraArgs:
    - -testnet
    - -rpcport=8332
  persistence:
    size:
      stagenet: 300Gi

litecoin-daemon:
  enabled: false

bitcoin-cash-daemon:
  enabled: false

# geth + prysm on SEPOLIA (the public ethereum testnet). Set a beacon checkpoint-sync URL to sync
# the beacon chain in minutes (see values comment; verify after sync).
ethereum-daemon:
  enabled: true
  network: sepolia
  # default requests 12Gi — unschedulable on 8GB workers; sepolia fits well below this
  resources:
    requests:
      cpu: 1500m
      memory: 5Gi
    limits:
      memory: 6Gi
  beaconCheckpointSyncUrl: https://checkpoint-sync.sepolia.ethpandaops.io
  persistence:
    size:
      stagenet: 250Gi

dogecoin-daemon:
  enabled: false

gaia-daemon:
  enabled: false

avalanche-daemon:
  enabled: false

binance-smart-daemon:
  enabled: false

base-daemon:
  enabled: false

# stellar quickstart (core + horizon + soroban-rpc) on the public stellar TESTNET
stellar-daemon:
  enabled: true
  network: testnet
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 6Gi
  persistence:
    size: 100Gi
