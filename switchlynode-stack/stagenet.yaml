# Switchly stagenet — values for the internal staging network.
#
# The network runs against PUBLIC TESTNETS with OUR OWN in-cluster chain nodes (no third-party RPC
# providers): bitcoin-daemon on testnet3, ethereum-daemon (geth+prysm) on sepolia, and
# stellar-daemon (quickstart) on the stellar testnet. All other chain daemons are disabled.
#
# The chain daemons deploy ONCE, with the genesis node; validator installs disable them and point
# bifrost at the genesis namespace's daemon services (the deploy workflow handles this). Resources
# are right-sized for 4vCPU/8GB workers.
#
# Image: the stagenet release channel on GHCR. `global.hash` (image digest) is REQUIRED by the chart
# for validators and is resolved + set by the deploy workflow at deploy time.
#
# Per-node overrides the deploy workflow sets:
#   switchlynode.type                               genesis | validator
#   switchlynode.env.SWITCHLY_SEED_NODES_ENDPOINT   "" on genesis, genesis API svc on validators
#   switchlynode.env.FAUCET / SWITCHLY_STAGENET_ADMIN_ADDRESSES   (genesis, from repo variables)
#   bifrost.peer                                    gateway svc of the genesis namespace (validators)
global:
  net: stagenet
  tag: stagenet
  hash: "" # image digest — set at deploy time, never defaulted

switchlynode:
  net: stagenet
  # chart default is 1024Gi/node (upstream's mainnet-scale assumption) — a fresh switchly stagenet
  # chain needs a few GB; 50Gi leaves months of headroom and keeps 6 nodes inside volume quotas
  persistence:
    size:
      stagenet: 50Gi
  # stagenet-scale resources (defaults are mainnet-grade and request whole workers)
  resources:
    requests:
      cpu: 1
      memory: 1536Mi
    limits:
      memory: 5Gi
  chainID:
    stagenet: switchly-stagenet-1
  env:
    SWITCHLY_SEED_NODES_ENDPOINT: ""
    # reuse the sepolia + stellar-testnet router deployments from tools/stagenet
    ETH_CONTRACT: "0xa8D1Ff3bfA490cf7890D0D2C0A2f5815744A279F"
    XLM_CONTRACT: "CAWZ7WYQBG2ENE7S7PAKPYVWKTOV3FMXMIKSOBBZE3JBJXTQWDGZDRGH"

bifrost:
  resources:
    requests:
      cpu: 500m
      memory: 1536Mi
    limits:
      memory: 6Gi
  chainID:
    stagenet: switchly-stagenet-1
  env:
    SWITCHLY_SEED_NODES_ENDPOINT: ""
    # ETH + XLM run against PUBLIC TESTNET endpoints (no in-cluster daemons — stellar-core + geth
    # full nodes do not fit the validator node pool). ETH -> a public Sepolia JSON-RPC (block
    # scanning, no wallet needed). XLM -> empty RPC host + chain_network=testnet, which makes the
    # stellar client fall back to the public testnet horizon + soroban endpoints.
    # BTC is DISABLED: bifrost's UTXO client needs wallet RPCs (createwallet/importaddress/
    # listunspent) that a shared public bitcoind cannot serve, so BTC requires its own node.
    BIFROST_CHAINS_BTC_DISABLED: "true"
    BIFROST_CHAINS_BTC_RPC_HOST: ""
    BIFROST_CHAINS_ETH_DISABLED: "false"
    BIFROST_CHAINS_ETH_RPC_HOST: "https://ethereum-sepolia-rpc.publicnode.com"
    BIFROST_CHAINS_ETH_BLOCK_SCANNER_RPC_HOST: "https://ethereum-sepolia-rpc.publicnode.com"
    BIFROST_CHAINS_XLM_DISABLED: "false"
    BIFROST_CHAINS_XLM_RPC_HOST: ""
    BIFROST_CHAINS_XLM_CHAIN_NETWORK: "testnet"
    BIFROST_CHAINS_AVAX_DISABLED: "true"
    BIFROST_CHAINS_GAIA_DISABLED: "true"
    BIFROST_CHAINS_BSC_DISABLED: "true"
    BIFROST_CHAINS_BASE_DISABLED: "true"
    BIFROST_CHAINS_DOGE_DISABLED: "true"
    BIFROST_CHAINS_BCH_DISABLED: "true"
    BIFROST_CHAINS_LTC_DISABLED: "true"
    BIFROST_CHAINS_XRP_DISABLED: "true"
  # no in-cluster chain daemons — bifrost uses public testnet endpoints (see env above)
  bitcoinDaemon:
    enabled: false
  litecoinDaemon:
    enabled: false
  bitcoinCashDaemon:
    enabled: false
  dogecoinDaemon:
    enabled: false
  ethereumDaemon:
    enabled: false
  gaiaDaemon:
    enabled: false
  avaxDaemon:
    enabled: false

midgard:
  enabled: false

# bitcoind on the PUBLIC TESTNET (testnet3): -testnet plus -rpcport pinned so the service port
# in-cluster chain daemons disabled — bifrost uses public testnet endpoints (see bifrost.env).
# A full bitcoind/geth/stellar-core does not fit the validator node pool; run them on a dedicated
# memory-optimized node pool if own-nodes are needed later.
bitcoin-daemon:
  enabled: false

litecoin-daemon:
  enabled: false

bitcoin-cash-daemon:
  enabled: false

ethereum-daemon:
  enabled: false

dogecoin-daemon:
  enabled: false

gaia-daemon:
  enabled: false

avalanche-daemon:
  enabled: false

binance-smart-daemon:
  enabled: false

base-daemon:
  enabled: false

stellar-daemon:
  enabled: false
