# Default values for stellar-daemon.
#
# Runs the stellar/quickstart image: stellar-core + horizon + soroban-rpc + internal database in a
# single container, serving everything on :8000 (soroban-rpc under /soroban/rpc — the layout the
# switchly bifrost stellar client expects). `network` selects the public stellar network.

replicaCount: 1

net: mainnet

# stellar network: "testnet" or "pubnet" (switchly stagenet runs testnet)
network: pubnet

# password for the quickstart container's INTERNAL postgres (never exposed outside the pod);
# quickstart refuses to start non-interactively without one
postgresPassword: stellar-internal

image:
  name: stellar/quickstart
  tag: testing
  hash: "" # optionally pin a digest; empty uses the tag only

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8000 # horizon + soroban-rpc

persistence:
  enabled: true
  size: 100Gi
  accessMode: ReadWriteOnce
  # existingClaim: your-pvc
  # storageClass: "-"
  # hostPath: /host-path

resources:
  requests:
    cpu: 1
    memory: 4Gi
  limits:
    memory: 8Gi

nodeSelector: {}

tolerations: []

affinity: {}
