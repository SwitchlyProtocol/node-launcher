apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "switchlynode.fullname" . }}
  labels:
    {{- include "switchlynode.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategyType }}
  selector:
    matchLabels:
      {{- include "switchlynode.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "switchlynode.selectorLabels" . | nindent 8 }}
    spec:
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      serviceAccountName: {{ include "switchlynode.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}

      initContainers:
      - name: init-external-ip
        image: alpine/k8s:{{ .Values.global.images.alpineK8s.tag }}@sha256:{{ .Values.global.images.alpineK8s.hash }}
        imagePullPolicy: IfNotPresent
        {{- if .Values.global.gateway.enabled }}
        command: ['/scripts/external-ip.sh', 'false', '{{ .Values.global.gateway.name }}', '{{ include "switchlynode.fullname" . }}-external-ip']
        {{- else }}
        command: ['/scripts/external-ip.sh', 'false', '{{ include "switchlynode.fullname" . }}', '{{ include "switchlynode.fullname" . }}-external-ip']
        {{- end }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts

      {{- if .Values.persistentPeerHosts }}
      # resolve peer node IDs at pod start (never bake them at install — a rebuilt peer changes ID
      # and a stale pin silently breaks the p2p handshake; see peer-ids.sh)
      - name: init-peer-ids
        image: alpine/k8s:{{ .Values.global.images.alpineK8s.tag }}@sha256:{{ .Values.global.images.alpineK8s.hash }}
        imagePullPolicy: IfNotPresent
        command: ['/scripts/peer-ids.sh', '{{ include "switchlynode.fullname" . }}-peers', '{{ include "switchlynode.p2p" . }}', '{{ include "switchlynode.rpc" . }}', '{{ join "," .Values.persistentPeerHosts }}']
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      {{- end }}

      {{- if .Values.haltHeight }}
      - name: halt-height
        image: {{ include "switchlynode.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ['sh', '-c', '[ ! -e /root/.switchlynode/data/priv_validator_state.json ] || [ $(cat /root/.switchlynode/data/priv_validator_state.json | jq -r .height) -lt {{ .Values.haltHeight }} ] || sleep infinity']
        volumeMounts:
          - name: data
            mountPath: /root/
      {{- end }}

      {{- if default .Values.peer .Values.global.peer }}
      - name: init-peer
        image: busybox:{{ .Values.global.images.busybox.tag }}@sha256:{{ .Values.global.images.busybox.hash }}
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -zv {{ default .Values.peer .Values.global.peer }}:{{ include "switchlynode.rpc" . }}; do echo waiting for peer switchlynode; sleep 2; done']
      {{- end }}

      {{- if .Values.peerApi }}
      - name: init-peer-api
        image: busybox:{{ .Values.global.images.busybox.tag }}@sha256:{{ .Values.global.images.busybox.hash }}
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', "until nc -zv {{ .Values.peerApi }}:1317; do echo waiting for peer switchlynode; sleep 2; done"]
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "switchlynode.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            -  /scripts/{{ .Values.type }}.sh
          volumeMounts:
            - name: data
              mountPath: /root/
            - name: scripts
              mountPath: /kube-scripts/
          env:
            - name: EXTERNAL_IP
              valueFrom:
                configMapKeyRef:
                  name: {{ include "switchlynode.fullname" . }}-external-ip
                  key: externalIP
            - name: VALIDATOR
              {{- if eq .Values.type "fullnode" }}
              value: "false"
              {{- else }}
              value: "true"
              {{- end }}
            - name: PEER
              value: {{ default .Values.peer .Values.global.peer }}
            - name: PEER_API
              value: {{ .Values.peerApi }}
            - name: DEBUG
              value: "{{ .Values.debug }}"
            - name: HARDFORK_BLOCK_HEIGHT
              value: "{{ .Values.haltHeight }}"
            - name: NET
              value: {{ include "switchlynode.net" . }}
            - name: SIGNER_NAME
              value: {{ .Values.signer.name }}
            - name: SIGNER_PASSWD
              {{- if default .Values.signer.passwordSecret .Values.global.passwordSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.signer.passwordSecret .Values.global.passwordSecret }}
                  key: password
              {{- else}}
              value: {{ .Values.signer.password }}
              {{- end }}
            - name: CHAIN_ID
              value: {{ include "switchlynode.chainID" . }}
            - name: SWITCHLY_AUTO_STATE_SYNC_ENABLED
              value: "{{ .Values.statesync.auto }}"
            - name: SWITCHLY_COSMOS_STATE_SYNC_SNAPSHOT_INTERVAL
              value: "{{ .Values.statesync.snapshotInterval }}"
            - name: SWITCHLY_TENDERMINT_LOG_FORMAT
              value: "json"
            # the enshrined-bifrost gRPC must listen beyond loopback so the bifrost POD can reach
            # it (the binary default 127.0.0.1:50051 assumes bifrost shares the network namespace).
            # Exposed on the ClusterIP service only — NEVER route it through the public gateway.
            - name: SWITCHLY_COSMOS_EBIFROST_ADDRESS
              value: "0.0.0.0:50051"
            - name: SIGNER_SEED_PHRASE
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.signer.mnemonicSecret .Values.global.mnemonicSecret }}
                  key: mnemonic
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.persistentPeerHosts }}
            # rendered after .Values.env so pod-start ID resolution wins over any static
            # SWITCHLY_TENDERMINT_P2P_PERSISTENT_PEERS left in env (k8s: last duplicate wins)
            - name: SWITCHLY_TENDERMINT_P2P_PERSISTENT_PEERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "switchlynode.fullname" . }}-peers
                  key: persistentPeers
            {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.port.api }}
              protocol: TCP
            - name: p2p
              containerPort: {{ include "switchlynode.p2p" . }}
              protocol: TCP
            - name: rpc
              containerPort: {{ include "switchlynode.rpc" . }}
              protocol: TCP
            - name: grpc
              containerPort: {{ include "switchlynode.grpc" . }}
              protocol: TCP
            - name: prometheus
              containerPort: 26660
              protocol: TCP
            - name: ebifrost
              containerPort: 50051
              protocol: TCP
          livenessProbe:
            timeoutSeconds: 10
            httpGet:
              path: /status
              port: rpc
          startupProbe:
            failureThreshold: 30
            timeoutSeconds: 10
            httpGet:
              path: /status
              port: rpc
          readinessProbe:
            timeoutSeconds: 10
            httpGet:
              path: /status
              port: rpc
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
      - name: data
      {{- if and .Values.persistence.enabled (not .Values.persistence.hostPath) }}
        persistentVolumeClaim:
          claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{- else }}{{ template "switchlynode.fullname" . }}{{- end }}
      {{- else if and .Values.persistence.enabled .Values.persistence.hostPath }}
        hostPath:
          path: {{ .Values.persistence.hostPath }}
          type: DirectoryOrCreate
      {{- else }}
        emptyDir: {}
      {{- end }}
      - name: scripts
        configMap:
          name: {{ include "switchlynode.fullname" . }}-scripts
          defaultMode: 0777
      - name: configs
        configMap:
          name: {{ include "switchlynode.fullname" . }}-configs
          defaultMode: 0666
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
