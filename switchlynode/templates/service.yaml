apiVersion: v1
kind: Service
metadata:
  name: {{ include "switchlynode.fullname" . }}
  labels:
    {{- include "switchlynode.labels" . | nindent 4 }}
  annotations:
    # AWS
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: {{ .Values.service.type }}
  {{- if ne "ClusterIP" .Values.service.type }}
  externalTrafficPolicy: Local
  {{- end }}
  ports:
    - name: api
      port: {{ .Values.service.port.api }}
      targetPort: api
      protocol: TCP
    - name: p2p
      port: {{ include "switchlynode.p2p" . }}
      targetPort: p2p
      protocol: TCP
    - name: rpc
      port: {{ include "switchlynode.rpc" . }}
      targetPort: rpc
      protocol: TCP
    - name: grpc
      port: {{ include "switchlynode.grpc" . }}
      targetPort: grpc
      protocol: TCP
    - name: prometheus
      port: 26660
      targetPort: prometheus
      protocol: TCP
    # enshrined-bifrost gRPC for the node's own bifrost pod — cluster-internal only, never
    # exposed on the gateway/public LB
    - name: ebifrost
      port: 50051
      targetPort: ebifrost
      protocol: TCP
  selector:
    {{- include "switchlynode.selectorLabels" . | nindent 4 }}
