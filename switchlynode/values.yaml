# Default values for switchlynode.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

net: mainnet
type: validator

autoupdate:
  enabled: false
  nodes: https://switchlynode.ninerealms.com/switchly/nodes

signer:
  name: switchly
  password: password
  mnemonicSecret: ""
  passwordSecret: ""

peer:
peerApi:

# Max retries (x2s) the init-peer / init-peer-api containers wait for the bootstrap peer's RPC
# before proceeding. BOUNDED on purpose: an unbounded wait deadlocks the whole network on a mass
# reschedule (every node waits on the peer; the peer waits on a down node). ~150 = ~5min; the node
# still bootstraps via persistentPeerHosts + init-peer-ids + seeds after the timeout.
peerWaitRetries: 150

# Hostnames (svc DNS) of validator peers to hold as tendermint persistent peers. Node IDs are
# resolved from each host's RPC /status at POD START by the init-peer-ids container — never pin
# "id@host" strings at install time (a rebuilt peer changes node ID and the stale pin silently
# breaks the p2p handshake). Unreachable hosts are skipped and picked up on the next restart.
# If set, this overrides any SWITCHLY_TENDERMINT_P2P_PERSISTENT_PEERS in env.
persistentPeerHosts: []

# See docs/Switchlynode-Snapshot-Recovery-and-Storage-Management.md for details.
statesync:
  auto: false
  snapshotInterval: 0

# provide custom environment variables to override config defaults:
# https://github.com/SwitchlyProtocol/switchlynode/-/blob/develop/config/default.yaml
env: {}

debug: false
chainID:
  mainnet: switchly-1
  stagenet: switchly-stagenet-2

haltHeight:

replicaCount: 1

strategyType: Recreate

image:
  repository: ghcr.io/switchlyprotocol/switchlynode
  pullPolicy: IfNotPresent
  tag: mainnet
  hash: placeholder

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port:
    api: 1317
    stagenet:
      p2p: 27146
      rpc: 27147
      grpc: 9090
    mainnet:
      p2p: 27146
      rpc: 27147
      grpc: 9090

persistence:
  enabled: true
  size:
    stagenet: 1024Gi
    mainnet: 1.5Ti
  accessMode: ReadWriteOnce
  # existingClaim: your-pvc
  # storageClass: "-"
  # hostPath: /host-path
  # subPath: subpath

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

priorityClassName: ""

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources:
  requests:
    cpu: 4
    memory: 4Gi
  limits:
    # cpu: 2
    # memory: 4Gi

nodeSelector: {}

tolerations: []

affinity: {}

global:
  gateway:
    enabled: false
  images:
    alpineK8s:
      tag: 1.25.16
      hash: 7480dd21404b26776642a286395db36310a83f8f93ae3393692d5c1e15a5e16a
    busybox:
      tag: latest
      hash: caa382c432891547782ce7140fb3b7304613d3b0438834dce1cad68896ab110a
