---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mirror-app
data:
  repos: |
    github.com/SwitchlyProtocol/switchlynode
    github.com/SwitchlyProtocol/node-launcher
    github.com/SwitchlyProtocol/cluster-launcher
    github.com/SwitchlyProtocol/midgard
    github.com/SwitchlyProtocol/tss/tss-lib
    github.com/SwitchlyProtocol/ledger-switchly-go
    github.com/asgardex/asgardex-desktop

  entrypoint.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    SRC_LIST="$1"
    ROOT="$2"

    # Sleep a random amount to prevent the thundering herd.
    SLEEP=$(($RANDOM % 900))
    echo "Sleeping $SLEEP seconds..."
    sleep $SLEEP

    get_sanitized_dir() {
        local HASH=$(printf "%s" "$1" | sha256sum - | cut -c 1-8)
        printf "%s-%s\n" "$HASH" "$1" | sed -Ee 's/[^A-Za-z0-9_.-]/_/g'
    }

    while IFS= read -r REPO; do
        OUT="$ROOT"/$(get_sanitized_dir "$REPO")
        if [ ! -d "$OUT" ]; then
            git clone --mirror "https://${REPO}.git" "$OUT"
        fi
        pushd "$OUT"
        git fetch --all
        popd
    done <"$SRC_LIST"
