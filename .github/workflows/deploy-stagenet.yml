name: Deploy stagenet

# Deploys and upgrades the Switchly stagenet on a Kubernetes cluster using the switchlynode-stack
# chart with switchlynode-stack/stagenet.yaml (public testnets, own in-cluster chain daemons:
# bitcoin testnet3, ethereum sepolia, stellar testnet).
#
# install: deploys ONE node (genesis or validator-N) into its own namespace. Each node gets a FRESH
#   mnemonic generated in-cluster on first install (stored only as the switchlynode-mnemonic secret
#   in the node's namespace — never in GitHub). Re-running is a no-op upgrade for an existing node.
#   Back up each mnemonic after install: make mnemonic NAME=switchly-stagenet-<node>
#
# upgrade: COORDINATED ROLLING UPGRADE of every deployed node to the requested image tag, one node
#   at a time, without touching chain state (PVCs persist): resolve the image digest once, then per
#   node helm-upgrade (values reused), wait for rollout, and wait for the node to finish catching up
#   before moving to the next — the network never loses quorum. Consensus-version activation is then
#   coordinated on-chain by the network's native version voting once a supermajority runs the new
#   version.
#
# Required repository secrets:
#   STAGENET_KUBECONFIG        kubeconfig for the target cluster (base64-encoded)
#   STAGENET_NODE_PASSWORD     keystore password shared by the stagenet nodes
# Required repository variables:
#   STAGENET_FAUCET_ADDRESS    master wallet address (faucet, genesis only)
#   STAGENET_ADMIN_ADDRESSES   admin mimir address(es), usually the same wallet
on:
  workflow_dispatch:
    inputs:
      action:
        description: "what to do"
        type: choice
        default: install
        options: [install, upgrade]
      node:
        description: "node to install (ignored for upgrade)"
        type: choice
        default: genesis
        options: [genesis, validator-1, validator-2, validator-3, validator-4, validator-5]
      image_tag:
        description: "image tag to deploy/upgrade to"
        default: stagenet

concurrency:
  group: deploy-stagenet
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_REPO: ghcr.io/switchlyprotocol/switchlynode
  GENESIS_NS: switchly-stagenet-genesis

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: stagenet
    steps:
      - uses: actions/checkout@v4

      - name: configure cluster access
        env:
          KUBECONFIG_B64: ${{ secrets.STAGENET_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl version --output=yaml | head -5

      - name: resolve image digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect "$IMAGE_REPO:${{ inputs.image_tag }}" --format '{{println .Manifest.Digest}}' | head -1 | sed 's/^sha256://')
          [ -n "$DIGEST" ] || { echo "could not resolve digest for ${{ inputs.image_tag }}"; exit 1; }
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "deploying $IMAGE_REPO:${{ inputs.image_tag }}@sha256:$DIGEST"

      - name: helm dependencies
        run: helm dependency update ./switchlynode-stack

      - name: install node
        if: ${{ inputs.action == 'install' }}
        env:
          NODE: ${{ inputs.node }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          NODE_PASSWORD: ${{ secrets.STAGENET_NODE_PASSWORD }}
        run: |
          set -euo pipefail
          NS="switchly-stagenet-$NODE"
          IMAGE="$IMAGE_REPO:${{ inputs.image_tag }}@sha256:$DIGEST"

          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

          # keystore password (idempotent)
          kubectl -n "$NS" get secret switchlynode-password >/dev/null 2>&1 || \
            kubectl -n "$NS" create secret generic switchlynode-password --from-literal=password="$NODE_PASSWORD"

          # FRESH mnemonic per node, generated in-cluster on first install only — each stagenet
          # validator gets its own new wallet/keys (never the dog/cat/fox/pig mocknet mnemonics)
          if ! kubectl -n "$NS" get secret switchlynode-mnemonic >/dev/null 2>&1; then
            echo "generating a fresh mnemonic for $NS"
            kubectl -n "$NS" run mnemonic --image="$IMAGE" --restart=Never --command -- /bin/sh -c 'tail -F /dev/null'
            kubectl -n "$NS" wait --for=condition=ready pod/mnemonic --timeout=5m
            MNEMONIC=$(kubectl -n "$NS" exec mnemonic -- switchlynode keys add generate --dry-run --output json | jq -r '.mnemonic')
            kubectl -n "$NS" delete pod --now=true mnemonic
            [ -n "$MNEMONIC" ] && [ "$MNEMONIC" != "null" ] || { echo "mnemonic generation failed"; exit 1; }
            kubectl -n "$NS" create secret generic switchlynode-mnemonic --from-literal=mnemonic="$MNEMONIC"
            echo "mnemonic stored as secret; back it up with: make mnemonic NAME=$NS"
          fi

          # per-node-type overrides
          EXTRA=()
          if [ "$NODE" = "genesis" ]; then
            # fail fast on missing genesis config: an empty faucet/admin renders an empty address
            # into genesis.json and the chain panics at init (11 minutes later, at rollout timeout)
            [ -n "${{ vars.STAGENET_FAUCET_ADDRESS }}" ] || { echo "::error::STAGENET_FAUCET_ADDRESS repository VARIABLE is not set"; exit 1; }
            [ -n "${{ vars.STAGENET_ADMIN_ADDRESSES }}" ] || { echo "::error::STAGENET_ADMIN_ADDRESSES repository VARIABLE is not set"; exit 1; }
            EXTRA+=(--set switchlynode.type=genesis)
            EXTRA+=(--set switchlynode.env.FAUCET="${{ vars.STAGENET_FAUCET_ADDRESS }}")
            EXTRA+=(--set switchlynode.env.SWITCHLY_STAGENET_ADMIN_ADDRESSES="${{ vars.STAGENET_ADMIN_ADDRESSES }}")
          else
            SEED="http://switchlynode.$GENESIS_NS.svc.cluster.local:1317/switchly/nodes"
            EXTRA+=(--set switchlynode.type=validator)
            # peer: tendermint persistent peer + the RPC the node fetches genesis from
            EXTRA+=(--set switchlynode.peer="switchlynode.$GENESIS_NS.svc.cluster.local")
            # the genesis node registers a worker-node IP on-chain where p2p is not reachable, so
            # the seeds mechanism cannot produce dialable peers in-cluster — pin the tendermint
            # persistent peer to the genesis service directly (validated live on the cluster)
            GENESIS_NODE_ID=$(kubectl -n "$GENESIS_NS" exec deploy/switchlynode -- curl -s http://localhost:27147/status | jq -r '.result.node_info.id')
            [ -n "$GENESIS_NODE_ID" ] && [ "$GENESIS_NODE_ID" != "null" ] || { echo "::error::could not resolve genesis node id"; exit 1; }
            EXTRA+=(--set switchlynode.env.SWITCHLY_TENDERMINT_P2P_PERSISTENT_PEERS="$GENESIS_NODE_ID@switchlynode.$GENESIS_NS.svc.cluster.local:27146")
            EXTRA+=(--set switchlynode.env.SWITCHLY_SEED_NODES_ENDPOINT="$SEED")
            EXTRA+=(--set bifrost.env.SWITCHLY_SEED_NODES_ENDPOINT="$SEED")
            # bifrost's TSS bootstrap resolves the peer's :6040/p2pid — that lives on the bifrost
            # service, not the gateway (pointing at the gateway left the p2p mesh empty and bifrost
            # fataled on the seed-file fallback)
            EXTRA+=(--set bifrost.peer="bifrost.$GENESIS_NS.svc.cluster.local")
            # chain daemons are disabled in stagenet.yaml — bifrost uses public testnet endpoints
            # (ETH Sepolia RPC + Stellar testnet), inherited from the values file, so validators
            # need no per-node daemon wiring.
          fi

          helm upgrade --install "$NS" ./switchlynode-stack -n "$NS" \
            -f ./switchlynode-stack/stagenet.yaml \
            --set global.net=stagenet \
            --set global.tag="${{ inputs.image_tag }}" \
            --set global.hash="$DIGEST" \
            --set global.mnemonicSecret=switchlynode-mnemonic \
            --set global.passwordSecret=switchlynode-password \
            "${EXTRA[@]}"

          kubectl -n "$NS" rollout status deploy/switchlynode --timeout=15m
          kubectl -n "$NS" get pods

      - name: coordinated rolling upgrade
        if: ${{ inputs.action == 'upgrade' }}
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail
          # every deployed stagenet node, genesis last (keeps the seed/peer anchor stable longest)
          NAMESPACES=$(helm ls -A -o json | jq -r '.[] | select(.chart | startswith("switchlynode-stack")) | .name' | sort | grep -v "^$GENESIS_NS$" || true)
          if helm ls -A -o json | jq -e --arg ns "$GENESIS_NS" '.[] | select(.name == $ns)' >/dev/null; then
            NAMESPACES="$NAMESPACES $GENESIS_NS"
          fi
          [ -n "${NAMESPACES// /}" ] || { echo "no deployed nodes found"; exit 1; }
          echo "upgrade order: $NAMESPACES"

          for NS in $NAMESPACES; do
            echo "=== upgrading $NS to ${{ inputs.image_tag }}@sha256:$DIGEST ==="
            helm upgrade "$NS" ./switchlynode-stack -n "$NS" --reuse-values \
              --set global.tag="${{ inputs.image_tag }}" \
              --set global.hash="$DIGEST"
            kubectl -n "$NS" rollout status deploy/switchlynode --timeout=15m
            kubectl -n "$NS" rollout status deploy/bifrost --timeout=15m || true

            # never move on until this node has fully caught up — the network keeps quorum
            echo "waiting for $NS to catch up..."
            for i in $(seq 1 90); do
              CATCHING=$(kubectl -n "$NS" exec deploy/switchlynode -- \
                curl -s http://localhost:27147/status | jq -r '.result.sync_info.catching_up' || echo unknown)
              [ "$CATCHING" = "false" ] && { echo "$NS caught up"; break; }
              sleep 10
            done
            [ "$CATCHING" = "false" ] || { echo "$NS did not catch up in time"; exit 1; }
          done
          echo "all nodes upgraded — on-chain version activates once a supermajority signals it"

      - name: dump events on failure
        if: failure()
        run: |
          for NS in $(kubectl get ns -o name | grep switchly-stagenet | cut -d/ -f2); do
            echo "=== $NS ==="; kubectl -n "$NS" get pods; kubectl -n "$NS" get events --sort-by=.lastTimestamp | tail -12
          done
