{{- if .Values.switchlynodeSnapshot.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: switchlynode-snapshot
spec:
  schedule: {{ .Values.switchlynodeSnapshot.schedule }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          activeDeadlineSeconds: {{ .Values.switchlynodeSnapshot.activeDeadlineSeconds }}
          serviceAccountName: switchlynode-snapshot
          containers:
            - name: switchlynode-snapshot
              image: {{ .Values.switchlynodeSnapshot.image.name }}:{{ .Values.switchlynodeSnapshot.image.tag }}@sha256:{{ .Values.switchlynodeSnapshot.image.hash }}
              imagePullPolicy: IfNotPresent
              env:
                {{- range $key, $value := .Values.switchlynodeSnapshot.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                - name: MINIO_IMAGE
                  value: {{ .Values.minio.image.name }}:{{ .Values.minio.image.tag }}@sha256:{{ .Values.minio.image.hash }}
                {{- range $key, $value := .Values.switchlynodeSnapshot.secretEnv }}
                - name: {{ $key }}
                  valueFrom:
                    secretKeyRef:
                      key: {{ $value | quote }}
                      name: provider
                {{- end }}
          restartPolicy: Never
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: switchlynode-snapshot
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, create, patch, delete, update, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [snapshot.storage.k8s.io]
    resources: [volumesnapshots]
    verbs: [delete, get, create]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [delete, get, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: switchlynode-snapshot
subjects:
  - kind: ServiceAccount
    name: switchlynode-snapshot
    apiGroup: ""
roleRef:
  kind: Role
  name: switchlynode-snapshot
  apiGroup: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: switchlynode-snapshot
{{- end }}
