# Default values for ethereum-daemon.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

net: mainnet

# Ethereum network for geth + the beacon chain: "mainnet" or "sepolia". Switchly stagenet runs
# sepolia (the public ethereum testnet).
network: mainnet

# Leveraging a checkpoint for the beacon chain will use less disk space and reduce sync
# time for the beacon chain to a few minutes (geth may still take hours or days). One
# provider list is found at https://eth-clients.github.io/checkpoint-sync-endpoints -
# you may select one from there or another source if desired. If you leverage a sync
# checkpoint it is important to note that the provider becomes a trusted party and
# should be verified by running `make verify-ethereum` after beacon sync shows 100%.
beaconCheckpointSyncUrl: ""

replicaCount: 1

image:
  eth:
    name: ethereum/client-go
    # v1.14.x (the old pin) predates the 2025/26 fork schedule and cannot follow current networks
    tag: v1.16.4
    hash: cfa9726d35e21435429933bdebf9aa92b9fe5bb9cc7074320f4f9d6a096a237a
  prysm:
    name: gcr.io/prysmaticlabs/prysm/beacon-chain
    # v5.2.0 rejects checkpoint states from the current fork schedule (unknown version 0x90000075)
    tag: v6.1.0
    hash: 103c71cd640cc3202dad98604568dbe8a95a5681c4739afd4fb72e84f062023c

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8545

ingress:
  enabled: false
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-production
  hosts:
    []
    # - host: midgard.example.com
    #   paths:
    #   - path: /
    #     backend:
    #       serviceName: gateway
    #       servicePort: midgard
  tls:
    []
    # - secretName: midgard-tls
    #   hosts:
    #     - midgard.example.com

persistence:
  enabled: true
  size:
    stagenet: 900Gi
    mainnet: 1792Gi
  accessMode: ReadWriteOnce
  # storageClass: "-"
  #
resources:
  limits:
    # cpu: 1
    memory: 12Gi
  requests:
    cpu: 2
    memory: 12Gi

nodeSelector: {}

tolerations: []

affinity: {}

# necessary for lint
global:
  images:
    alpine:
      tag: foo
      hash: bar
