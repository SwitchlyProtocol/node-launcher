# Default values for bitcoin-daemon.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

net: mainnet

# extra bitcoind arguments appended to the default args, e.g.
#   ["-signet", "-rpcport=8332", "-dbcache=300"]  - bitcoin signet (switchly stagenet: light,
#                                                   ~1-2Gi RAM, reliable faucet; keep rpcport=8332
#                                                   so the image probes and bifrost still match)
#   ["-testnet", "-rpcport=8332"]                 - bitcoin testnet3
extraArgs: []

image:
  name: registry.gitlab.com/thorchain/devops/node-launcher
  tag: "bitcoin-daemon-26.2"
  hash: "0080dd15a8a06312e2ca7bd5051ecc838275345ea98b285e7d66941225dd90c7"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

persistence:
  enabled: true
  size:
    # signet with -txindex is ~25Gi and grows (recent signet is tx-heavy); 100Gi gives headroom
    # without blowing the volume quota — a full disk crash-loops bitcoind mid-IBD
    stagenet: 100Gi
    mainnet: 1000Gi
  accessMode: ReadWriteOnce
  # storageClass: "-"

podSecurityContext:
  fsGroup: 1000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port:
    mainnet:
      p2p: 8333
      rpc: 8332
    stagenet:
      p2p: 8333
      rpc: 8332

ingress:
  enabled: false
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-production
  hosts:
    []
    # - host: midgard.example.com
    #   paths:
    #   - path: /
    #     backend:
    #       serviceName: gateway
    #       servicePort: midgard
  tls:
    []
    # - secretName: midgard-tls
    #   hosts:
    #     - midgard.example.com

resources:
  limits:
    # cpu: 1
    memory: 5Gi
  requests:
    cpu: 1
    memory: 5Gi

nodeSelector: {}

tolerations: []

affinity: {}

global: {}
